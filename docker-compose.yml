services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - ADMIN_API_KEY=${ADMIN_API_KEY:-dev-secret}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - AUTHORIZED_USERS=${AUTHORIZED_USERS}
    restart: unless-stopped

  telegram_bot:
    build: .
    command: python -m src.telegram_bot
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - API_URL=http://api:8000
      - ADMIN_API_KEY=${ADMIN_API_KEY:-dev-secret}
      - TELEGRAM_AUTHORIZED_USERS=${TELEGRAM_AUTHORIZED_USERS}
      - RATE_LIMIT_TELEGRAM_USER=${RATE_LIMIT_TELEGRAM_USER:-10}
    depends_on:
      - api
    restart: unless-stopped
